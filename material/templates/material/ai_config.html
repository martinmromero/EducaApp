{% extends 'material/base.html' %}
{% block content %}
<div class="container py-4" style="max-width: 760px;">

  <h2 class="mb-1"><i class="bi bi-cpu me-2"></i>Proveedor de IA</h2>
  <p class="text-muted mb-4">Elegí cómo querés que EducaApp acceda a la inteligencia artificial.</p>

  <!-- Estado actual -->
  <div class="card mb-4">
    <div class="card-body d-flex align-items-center gap-3">
      <div id="status-icon" class="fs-2">⏳</div>
      <div>
        <div class="fw-semibold" id="status-text">Verificando conexión…</div>
        <small class="text-muted" id="status-detail"></small>
      </div>
      <button class="btn btn-sm btn-outline-secondary ms-auto" onclick="checkStatus()">
        <i class="bi bi-arrow-clockwise"></i> Verificar
      </button>
    </div>
  </div>

  <!-- Formulario -->
  <form method="post" id="ai-config-form">
    {% csrf_token %}

    <!-- Opciones -->
    <div class="row g-3 mb-4">

      <!-- Ollama local -->
      <div class="col-12">
        <label class="card p-3 d-flex flex-row align-items-start gap-3
                      {% if config.source == 'ollama_local' %}border-primary bg-primary bg-opacity-10{% endif %}"
               style="cursor:pointer" for="src_ollama">
          <input class="form-check-input mt-1 flex-shrink-0" type="radio" name="source"
                 id="src_ollama" value="ollama_local"
                 {% if config.source == 'ollama_local' %}checked{% endif %}
                 onchange="onSourceChange()">
          <div class="flex-grow-1">
            <div class="fw-semibold"><i class="bi bi-hdd-network me-1"></i>IA Local (Ollama)</div>
            <small class="text-muted">Usa el servidor Ollama de la red interna. Sin costo, sin internet requerido,
            privado. Ideal si hay conectividad con el servidor.</small>

            <!-- Configuración avanzada de Ollama -->
            <div id="ollama-fields" class="mt-3 {% if config.source != 'ollama_local' %}d-none{% endif %}">
              <div class="mb-2">
                <label class="form-label fw-semibold small mb-1">URL del servidor Ollama</label>
                <input type="url" class="form-control form-control-sm" name="ollama_url"
                       value="{{ config.ollama_url|default:'' }}"
                       placeholder="{{ default_ollama_url }}">
                <div class="form-text">Dejá vacío para usar la URL por defecto: <code>{{ default_ollama_url }}</code></div>
              </div>
            </div>
          </div>
        </label>
      </div>

      <!-- BYOK -->
      <div class="col-12">
        <label class="card p-3 d-flex flex-row align-items-start gap-3 cursor-pointer
                      {% if config.source == 'byok' %}border-primary bg-primary bg-opacity-10{% endif %}"
               style="cursor:pointer" for="src_byok">
          <input class="form-check-input mt-1 flex-shrink-0" type="radio" name="source"
                 id="src_byok" value="byok"
                 {% if config.source == 'byok' %}checked{% endif %}
                 onchange="onSourceChange()">
          <div class="flex-grow-1">
            <div class="fw-semibold"><i class="bi bi-key me-1"></i>Mi propia API Key (BYOK)</div>
            <small class="text-muted">Usá tu cuenta personal de OpenAI, Google Gemini o Anthropic.</small>

            <!-- Campos BYOK (visibles solo cuando está seleccionado) -->
            <div id="byok-fields" class="mt-3 {% if config.source != 'byok' %}d-none{% endif %}">

              <!-- Instructivo para obtener API Keys -->
              <div class="alert alert-info py-2 px-3 mb-3" id="byok-instructivo">
                <div class="fw-semibold mb-1"><i class="bi bi-info-circle me-1"></i>¿Cómo obtener tu API Key?</div>
                <div id="info-openai" class="small">
                  <strong>OpenAI:</strong> Ingresá a <a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener">platform.openai.com/api-keys</a>, creá una cuenta y generá una nueva clave.
                  Los modelos recomendados son <code>gpt-4o-mini</code> (económico) o <code>gpt-4o</code>.
                </div>
                <div id="info-gemini" class="small d-none">
                  <strong>Google Gemini:</strong> Ingresá a <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com/apikey</a> y generá una clave gratis.
                  Modelo recomendado: <code>gemini-2.5-flash</code>.
                </div>
                <div id="info-anthropic" class="small d-none">
                  <strong>Anthropic (Claude):</strong> Ingresá a <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">console.anthropic.com/settings/keys</a> y creá una nueva clave.
                  Modelo recomendado: <code>claude-3-haiku-20240307</code> (el más económico).
                </div>
                <div id="info-groq" class="small d-none">
                  <strong>Groq:</strong> Ingresá a <a href="https://console.groq.com/keys" target="_blank" rel="noopener">console.groq.com/keys</a>. Es gratuito con límites generosos y muy rápido.
                  Modelos: <code>llama-3.1-8b-instant</code> o <code>mixtral-8x7b-32768</code>.
                </div>
                <div id="info-other" class="small d-none">
                  Consultá la documentación del proveedor para obtener tu API Key y la URL de su endpoint.
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Proveedor</label>
                <select class="form-select" name="provider" id="byok-provider" onchange="onProviderChange()">
                  <optgroup label="Principales">
                    <option value="openai"    {% if config.provider == 'openai'    %}selected{% endif %}>OpenAI — GPT-4o, GPT-4o mini</option>
                    <option value="gemini"    {% if config.provider == 'gemini'    %}selected{% endif %}>Google Gemini — Gemini 2.5 Flash / Pro</option>
                    <option value="anthropic" {% if config.provider == 'anthropic' %}selected{% endif %}>Anthropic — Claude 3 Haiku / Sonnet</option>
                  </optgroup>
                  <optgroup label="Avanzado">
                    <option value="groq"             {% if config.provider == 'groq'             %}selected{% endif %}>Groq (Llama, Mixtral — muy rápido, gratis)</option>
                    <option value="mistral"          {% if config.provider == 'mistral'          %}selected{% endif %}>Mistral AI</option>
                    <option value="openrouter"       {% if config.provider == 'openrouter'       %}selected{% endif %}>OpenRouter (múltiples modelos)</option>
                    <option value="openai_compatible"{% if config.provider == 'openai_compatible'%}selected{% endif %}>Otro compatible con OpenAI (URL personalizada)</option>
                  </optgroup>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">Modelo</label>
                <input type="text" class="form-control" name="model" id="byok-model"
                       value="{{ config.model }}" placeholder="ej. gpt-4o-mini">
                <div class="form-text">Nombre exacto del modelo tal como lo indica el proveedor.</div>
              </div>

              <div class="mb-3" id="base-url-field"
                   style="{% if config.provider != 'openai_compatible' %}display:none{% endif %}">
                <label class="form-label fw-semibold">URL base del endpoint</label>
                <input type="url" class="form-control" name="base_url"
                       value="{{ config.base_url|default:'' }}"
                       placeholder="https://tu-servidor/v1">
                <div class="form-text">Solo para endpoints compatibles con OpenAI con URL propia.</div>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold">API Key</label>
                <div class="input-group">
                  <input type="password" class="form-control" name="api_key" id="api-key-input"
                         autocomplete="new-password"
                         placeholder="{% if has_api_key %}••••••••  (guardada — dejar vacío para no cambiar){% else %}sk-...{% endif %}">
                  <button class="btn btn-outline-secondary" type="button"
                          onclick="toggleKeyVisibility()">
                    <i class="bi bi-eye" id="eye-icon"></i>
                  </button>
                </div>
                {% if has_api_key and config.source == 'byok' %}
                  <div class="form-text text-success">
                    <i class="bi bi-shield-lock me-1"></i>Key guardada y cifrada. Dejá el campo vacío para mantenerla.
                  </div>
                {% endif %}
              </div>

            </div><!-- /byok-fields -->
          </div>
        </label>
      </div>

      <!-- Institucional -->
      <div class="col-12">
        <label class="card p-3 d-flex flex-row align-items-start gap-3 cursor-pointer
                      {% if config.source == 'institutional' %}border-primary bg-primary bg-opacity-10{% endif %}"
               style="cursor:pointer" for="src_inst">
          <input class="form-check-input mt-1 flex-shrink-0" type="radio" name="source"
                 id="src_inst" value="institutional"
                 {% if config.source == 'institutional' %}checked{% endif %}
                 {% if not institutions_with_ai %}disabled title="No hay instituciones con IA configurada"{% endif %}
                 onchange="onSourceChange()">
          <div class="flex-grow-1">
            <div class="fw-semibold">
              <i class="bi bi-buildings me-1"></i>Configuración de la Institución
              {% if not institutions_with_ai %}
                <span class="badge bg-secondary ms-2">No configurada</span>
              {% endif %}
            </div>
            <small class="text-muted">Usa la API Key configurada por tu institución. No necesitás cuenta propia.</small>

            <!-- Selector de institución -->
            <div id="inst-fields" class="mt-3 {% if config.source != 'institutional' %}d-none{% endif %}">
              {% if institutions_with_ai %}
                <label class="form-label fw-semibold">Institución</label>
                <select class="form-select" name="institution_id">
                  <option value="">— Seleccioná una institución —</option>
                  {% for inst in institutions_with_ai %}
                    <option value="{{ inst.pk }}"
                      {% if config.institution_id == inst.pk %}selected{% endif %}>
                      {{ inst.name }} ({{ inst.ai_config.get_provider_display }})
                    </option>
                  {% endfor %}
                </select>
              {% else %}
                <p class="text-muted small mb-1">
                  Ninguna de tus instituciones tiene una configuración de IA activa.
                  {% if not is_staff %}Pedile al administrador que la configure.{% endif %}
                </p>
              {% endif %}
            </div>
            {% if is_staff and not institutions_with_ai %}
              <a href="{% url 'material:institution_ai_config' %}" class="btn btn-sm btn-outline-primary mt-2">
                <i class="bi bi-shield-lock me-1"></i>Configurar IA institucional
              </a>
            {% endif %}
          </div>
        </label>
      </div>

    </div><!-- /row -->

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">
        <i class="bi bi-floppy me-1"></i>Guardar configuración
      </button>
      <a href="{% url 'material:index' %}" class="btn btn-outline-secondary">Cancelar</a>
    </div>
  </form>
</div>

<script>
const DEFAULT_MODELS = {
  openai: 'gpt-4o-mini',
  gemini: 'gemini-2.5-flash',
  anthropic: 'claude-3-haiku-20240307',
  groq: 'llama-3.1-8b-instant',
  mistral: 'mistral-small-latest',
  openrouter: 'openai/gpt-4o-mini',
  openai_compatible: '',
};

function onSourceChange() {
  const src = document.querySelector('input[name="source"]:checked')?.value;
  document.getElementById('ollama-fields').classList.toggle('d-none', src !== 'ollama_local');
  document.getElementById('byok-fields').classList.toggle('d-none', src !== 'byok');
  document.getElementById('inst-fields').classList.toggle('d-none', src !== 'institutional');
}

function onProviderChange() {
  const p = document.getElementById('byok-provider').value;
  document.getElementById('base-url-field').style.display =
    (p === 'openai_compatible') ? '' : 'none';

  // Sugerir modelo por defecto si el campo está vacío o tenía un default previo
  const modelInput = document.getElementById('byok-model');
  const currentModel = modelInput.value.trim();
  const prevDefaults = Object.values(DEFAULT_MODELS);
  if (!currentModel || prevDefaults.includes(currentModel)) {
    modelInput.value = DEFAULT_MODELS[p] || '';
  }

  // Mostrar instructivo correspondiente
  ['openai','gemini','anthropic','groq'].forEach(k => {
    document.getElementById('info-' + k)?.classList.add('d-none');
  });
  document.getElementById('info-other')?.classList.add('d-none');
  const infoEl = document.getElementById('info-' + p) || document.getElementById('info-other');
  infoEl?.classList.remove('d-none');
}

function toggleKeyVisibility() {
  const inp = document.getElementById('api-key-input');
  const icon = document.getElementById('eye-icon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'bi bi-eye-slash';
  } else {
    inp.type = 'password';
    icon.className = 'bi bi-eye';
  }
}

const STATUS_MSGS = {
  ollama_local: {
    ok:   'Servidor Ollama conectado',
    fail: 'Servidor Ollama no disponible. Verificá que el servidor esté activo y accesible desde esta red.',
  },
  byok: {
    ok:   'Proveedor externo conectado',
    fail: 'No se pudo conectar con el proveedor. Verificá tu API Key y el proveedor seleccionado.',
  },
  institutional: {
    ok:   'Configuración institucional activa',
    fail: 'La configuración institucional no está disponible. Contactá al administrador.',
  },
};

function checkStatus() {
  document.getElementById('status-icon').textContent = '⏳';
  document.getElementById('status-text').textContent = 'Verificando…';
  document.getElementById('status-detail').textContent = '';
  fetch('{% url "material:ai_config_status" %}')
    .then(r => r.json())
    .then(data => {
      const backend = data.backend || 'ollama_local';
      const msgs = STATUS_MSGS[backend] || STATUS_MSGS['ollama_local'];
      if (data.connected) {
        const ready = data.ready_for_generation !== false;
        document.getElementById('status-icon').textContent = ready ? '✅' : '⚠️';
        document.getElementById('status-text').textContent = ready ? msgs.ok : 'Conectado, pero el modelo no está listo para generar';
        const detail = [];
        if (data.provider && data.provider !== backend) detail.push(data.provider);
        if (data.model) detail.push(data.model);
        if (data.url)   detail.push(data.url);
        if (!ready) detail.push('revisá el modelo');
        document.getElementById('status-detail').textContent = detail.join(' — ');
      } else {
        document.getElementById('status-icon').textContent = '❌';
        document.getElementById('status-text').textContent = msgs.fail;
        document.getElementById('status-detail').textContent = data.error || '';
      }
    })
    .catch(() => {
      document.getElementById('status-icon').textContent = '❌';
      document.getElementById('status-text').textContent = 'Error al verificar el estado';
    });
}

document.addEventListener('DOMContentLoaded', checkStatus);
</script>
{% endblock %}
