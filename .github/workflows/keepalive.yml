name: Keepalive Render

on:
  schedule:
    - cron: '*/10 * * * *'  # cada 10 minutos
  workflow_dispatch:         # también ejecutable manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://educaapp.onrender.com/health/)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: health check returned $STATUS"
          fi
